<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Web</title>
<link rel="stylesheet" href="/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">
  <header id="header">
    <div id="brand">♚ Chess</div>
    <div id="mode-indicator">PvP</div>
    <div id="header-actions">
      <button id="btn-new" title="New Game">+ New Game</button>
      <button id="btn-undo" title="Undo">↩ Undo</button>
    </div>
  </header>

  <main id="main">
    <div id="board-container">
      <div id="board"></div>
    </div>

    <aside id="sidebar">
      <div id="status-panel">
        <div id="status-text">White's turn</div>
      </div>
      <div id="move-history-panel">
        <h3>Moves</h3>
        <div id="move-list"></div>
      </div>
    </aside>
  </main>
</div>

<!-- Promotion Dialog -->
<div id="promo-dialog" class="dialog-overlay hidden">
  <div class="dialog">
    <h3>Promote pawn to:</h3>
    <div id="promo-choices">
      <button class="promo-btn" data-piece="q">♕</button>
      <button class="promo-btn" data-piece="r">♖</button>
      <button class="promo-btn" data-piece="b">♗</button>
      <button class="promo-btn" data-piece="n">♘</button>
    </div>
  </div>
</div>

<!-- Mode Selection Dialog -->
<div id="mode-dialog" class="dialog-overlay hidden">
  <div class="dialog">
    <h3>Select Game Mode</h3>
    <div id="mode-choices">
      <button class="mode-btn" data-mode="pvp">Player vs Player</button>
      <button class="mode-btn" data-mode="pvcpu">Player vs CPU (White)</button>
      <button class="mode-btn" data-mode="cpuvp">CPU vs Player (Black)</button>
      <button class="mode-btn" data-mode="aivai">AI vs AI (Spectator)</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
